<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="./css/style.css">

    <title>Alke Wallet | Bienvenido</title>
</head>
<body>
    
    <main>
        <div class="container-fluid main-container">
            <div class="row justify-content-evenly row-central">
                <div class="col-12 col-md-8 central d-flex flex-column justify-content-center align-items-center login-page">
                    <div class=" col-12 m-md-2 text-center justify-content-evenly">
                        <h1 class="header-principal user-select-none">Bienvenido a Alke Wallet</h1>
                        <img src="./img/magnific__logo-moderno-wallet-AWBnofondo.png" alt="" class="img-login">
                        <hr>
                        <div class="row justify-content-around">
                            <div class="botones-login">
                                <div class="btn-iniciar-sesion">
                                    <a type="button" href="login.html" class="btn btn-confirmar">Iniciar sesión</a>
                                    <p class="p-login user-select-none">Si tienes cuenta</p>
                                </div>
                                <div class="btn-registrarse">
                                    <a type="button" href="registro.html" class="btn btn-green">Registrarse</a>
                                    <p class="p-login user-select-none">Crea tu cuenta</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-2 lateral">
                    <div id="carouselLeft" class="carousel slide" data-bs-ride="carousel" data-bs-touch="false">
                        <div class="carousel-inner">
                            <div class="carousel-item active">
                            <img src="./img/magnific_grayscale-bglat1.png" class="d-block w-100" alt="imagen lateral">
                            </div>
                            <div class="carousel-item">
                            <img src="./img/fondo-login.png" class="d-block w-100" alt="imagen lateral">
                            </div>
                            <div class="carousel-item">
                            <img src="./img/magnific_grayscale-bglat2.png" class="d-block w-100" alt="imagen lateral">
                            </div>                            
                        </div>
                    </div>
                </div>
                <div class="col-md-2 lateral">
                    <div id="carouselRight" class="carousel slide" data-bs-ride="carousel" data-bs-touch="false">
                        <div class="carousel-inner">
                            <div class="carousel-item active">
                            <img src="./img/fondo-login.png" class="d-block w-100" alt="imagen lateral">
                            </div>
                            <div class="carousel-item">
                            <img src="./img/magnific_grayscale-bglat2.png" class="d-block w-100" alt="imagen lateral">
                            </div>
                            <div class="carousel-item">
                            <img src="./img/magnific_grayscale-bglat1.png" class="d-block w-100" alt="imagen lateral">
                            </div>                            
                        </div>
                    </div>
                </div>
            </div>
            
        </div> 
    </main>
    <footer>
        <p class="copyright user-select-none justify-content-center align-items-center pt-3">2026 © Felipe Calderón. Derechos reservados ®</p>
    </footer>
    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
