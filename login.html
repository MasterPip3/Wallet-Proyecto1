<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="/style.css">
    <title>Alke Wallet | Login</title>
</head>
<body class="body-login">
    <header>
        <h1>Bienvenido a Alke Wallet | Login</h1>
        <img src="/img/magnific_logo-moderno-wallet-elect_AWtranspN.png" alt="logo AW" class="logo-login">
    </header>

    <main>
        <form action="#" class="login">
            <h2 class="titulo2 mb-3">Iniciar sesión</h2>
            <div class="mb-3">
                <label for="formGroupExampleInput" class="form-label">Nombre de usuario</label>
                <input type="text" class="form-control" id="formGroupExampleInput" placeholder="Usuario">
            </div>
            <div class="mb-3">
                <label for="formGroupExampleInput2" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="formGroupExampleInput2" placeholder="Ingresa tu contraseña">
            </div>
            <button type="submit" class="btn btn-primary">Ingresar</button>
        </form>
    </main>


    <footer>
        <p class="copyright">2026 © Felipe Calderón. Derechos reservados ®</p>
    </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
