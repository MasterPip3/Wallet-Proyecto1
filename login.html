<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="./css/style.css">

    <title>Alke Wallet | Login</title>
</head>
<body>
    
    <main>
        <div class="container-fluid login-page">
            <div class="row justify-content-evenly login-row">
                <div class="col-12 col-md-8 central d-flex flex-column justify-content-center align-items-center">
                    <div class=" col-12 m-md-2 text-center justify-content-evenly">
                        <h2 class="header-principal user-select-none">Bienvenido a Alke Wallet</h2>
                        <img src="./img/magnific__logo-moderno-wallet-AWBnofondo.png" alt="logo" class="img-login">
                        <hr>
                        <div class="row justify-content-around">
                            <div class="col-7 mb-5 form">
                                <div id="mensajesLogin"></div>
                                <form action="" id="formularioLogin">
                                    <div class="row">
                                        <div class="mb-3">
                                            <label for="loginUsuario" class="form-label">Tu nombre de usuario</label>
                                            <input type="text" class="form-control" id="loginUsuario" placeholder="Usuario">
                                        </div>                                        
                                        <div class="mb-5">
                                            <label for="loginPassword" class="form-label">Ingresa una contraseña</label>
                                            <input type="password" class="form-control" id="loginPassword" placeholder="Password1234">
                                        </div>                                        
                                        <div class="row">
                                            <div class="botones-login d-flex align-content-center justify-content-evenly">
                                                <div class="btn-registrarse">
                                                    <a type="button" href="registro.html" class="btn btn-green">Registrarse</a>
                                                    <p class="p-login user-select-none">Crea tu cuenta</p>
                                                </div>
                                                <div class="btn-iniciar-sesion">
                                                    <button type="submit" id="btnLogin" class="btn btn-confirmar">Iniciar sesión</button>
                                                    <p class="p-login user-select-none">Si tienes una cuenta</p>
                                                </div>                                                
                                            </div>
                                        </div>
                                    </div>
                                </form>    
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-2 lateral">
                    <div id="carouselLeft" class="carousel slide" data-bs-ride="carousel" data-bs-touch="false">
                        <div class="carousel-inner">
                            <div class="carousel-item active">
                            <img src="./img/magnific_grayscale-bglat1.png" class="d-block w-100" alt="imagen lateral">
                            </div>
                            <div class="carousel-item">
                            <img src="./img/fondo-login.png" class="d-block w-100" alt="imagen lateral">
                            </div>
                            <div class="carousel-item">
                            <img src="./img/magnific_grayscale-bglat2.png" class="d-block w-100" alt="imagen lateral">
                            </div>                            
                        </div>
                    </div>
                </div>
                <div class="col-md-2 lateral">
                    <div id="carouselRight" class="carousel slide" data-bs-ride="carousel" data-bs-touch="false">
                        <div class="carousel-inner">
                            <div class="carousel-item active">
                            <img src="./img/fondo-login.png" class="d-block w-100" alt="imagen lateral">
                            </div>
                            <div class="carousel-item">
                            <img src="./img/magnific_grayscale-bglat2.png" class="d-block w-100" alt="imagen lateral">
                            </div>
                            <div class="carousel-item">
                            <img src="./img/magnific_grayscale-bglat1.png" class="d-block w-100" alt="imagen lateral">
                            </div>                            
                        </div>
                    </div>
                </div>
            </div>
            
        </div> 
    </main>
    <footer>
        <p class="copyright user-select-none justify-content-center align-items-center pt-3">2026 © Felipe Calderón. Derechos reservados ®</p>
    </footer>
<script>
/* PAGINA LOGIN */

document.getElementById("formularioLogin").addEventListener("submit",function(event){
    event.preventDefault();

    const loginUsuario = document.getElementById("loginUsuario").value;
    const loginContraseña = document.getElementById("loginPassword").value;

    const usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

    const usuarioEncontrado = usuarios.find(function(user){
        return user.usuario === loginUsuario && user.contraseña === loginContraseña;

    })

    if (usuarioEncontrado) {
        localStorage.setItem("usuarioLogueado",JSON.stringify(usuarioEncontrado))

        document.getElementById("mensajesLogin").innerHTML = `
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden"></span>
            </div>
            Inicio de sesión confirmado. Redirigiendo...
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        `
        setTimeout(() =>{
            window.location.href = "menu.html";
        }, 3000);

    } else {
        document.getElementById("mensajesLogin").innerHTML = `
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            Usuario no encontrado o contraseña incorrecta.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        `
        setTimeout(() =>{
            document.getElementById("mensajeLogin").innerHTML= "";
        }, 3000);
    }

    
})

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
