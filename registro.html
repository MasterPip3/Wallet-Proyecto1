<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="./css/style.css">

    <title>Alke Wallet | Registro</title>
</head>
<body>
    
    <main>
        <div class="container-fluid login-page">
            <div class="row justify-content-evenly login-row">
                <div class="col-12 col-md-8 central d-flex flex-column justify-content-center align-items-center">
                    <div class=" col-12 m-md-2 text-center justify-content-evenly">
                        <div>
                            <h2 class="header-principal user-select-none">Bienvenido a Alke Wallet</h2>
                            <img src="./img/magnific__logo-moderno-wallet-AWBnofondo.png" alt="logo" class="img-login">                                                            
                            <div id="mensajes"></div>
                        </div>
                        <hr>
                        <div class="row justify-content-around">
                            <div class="col-7 mb-5 form">
                                <form action="" id="formularioRegistro">
                                    <div class="row">
                                        <div class="col mb-3">
                                            <label for="registroNombre" class="form-label">Nombre</label>
                                            <input type="text" class="form-control" id="registroNombre" placeholder="Nombre" aria-label="First name">
                                        </div>
                                        <div class="col mb-3">
                                            <label for="registroApellido" class="form-label">Apellido</label>
                                            <input type="text" class="form-control" id="registroApellido" placeholder="Apellido" aria-label="Last name">
                                        </div>
                                        <div class="mb-3">
                                            <label for="registroUsuario" class="form-label">Tu nombre de usuario</label>
                                            <input type="text" class="form-control" id="registroUsuario" placeholder="Usuario">
                                        </div>
                                        <div class="mb-3">
                                            <label for="registroEmail" class="form-label">Correo electrónico</label>
                                            <input type="email" class="form-control" id="registroEmail" placeholder="email@ejemplo.com">
                                        </div>
                                        <div class="mb-3">
                                            <label for="registroPassword" class="form-label">Ingresa una contraseña</label>
                                            <input type="password" class="form-control" id="registroPassword" placeholder="Password1234">
                                        </div>
                                        <div class="mb-3">
                                            <label for="confirmacionPassword" class="form-label">Confirma tu contraseña</label>
                                            <input type="password" class="form-control" id="confirmacionPassword" placeholder="Password1234">
                                        </div>
                                        <div class="row">
                                            <div class="botones-login d-flex align-content-center justify-content-evenly">                                                
                                                <div class="btn-registrarse">
                                                    <button type="submit" id="btnRegistro" class="btn btn-green">Registrarse</button>
                                                    <p class="p-login user-select-none">Crea tu cuenta</p>
                                                </div>
                                                <div class="btn-iniciar-sesion">
                                                    <a type="button" href="login.html" class="btn btn-confirmar">Iniciar sesión</a>
                                                    <p class="p-login user-select-none">Si tienes una cuenta</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>                                    
                                </form>    
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-2 lateral">
                    <div id="carouselLeft" class="carousel slide" data-bs-ride="carousel" data-bs-touch="false">
                        <div class="carousel-inner">
                            <div class="carousel-item active">
                            <img src="./img/magnific_grayscale-bglat1.png" class="d-block w-100" alt="imagen lateral">
                            </div>
                            <div class="carousel-item">
                            <img src="./img/fondo-login.png" class="d-block w-100" alt="imagen lateral">
                            </div>
                            <div class="carousel-item">
                            <img src="./img/magnific_grayscale-bglat2.png" class="d-block w-100" alt="imagen lateral">
                            </div>                            
                        </div>
                    </div>
                </div>
                <div class="col-md-2 lateral">
                    <div id="carouselRight" class="carousel slide" data-bs-ride="carousel" data-bs-touch="false">
                        <div class="carousel-inner">
                            <div class="carousel-item active">
                            <img src="./img/fondo-login.png" class="d-block w-100" alt="imagen lateral">
                            </div>
                            <div class="carousel-item">
                            <img src="./img/magnific_grayscale-bglat2.png" class="d-block w-100" alt="imagen lateral">
                            </div>
                            <div class="carousel-item">
                            <img src="./img/magnific_grayscale-bglat1.png" class="d-block w-100" alt="imagen lateral">
                            </div>                            
                        </div>
                    </div>
                </div>
            </div>
            
        </div> 
    </main>
    <footer>
        <p class="copyright user-select-none justify-content-center align-items-center pt-3">2026 © Felipe Calderón. Derechos reservados ®</p>
    </footer>

<script>
/* PAGINA REGISTRO */
document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("formularioRegistro").addEventListener("submit",function(event){
        event.preventDefault();

        const nombre = document.getElementById("registroNombre").value;
        const apellido = document.getElementById("registroApellido").value;
        const usuario = document.getElementById("registroUsuario").value;
        const email = document.getElementById("registroEmail").value
        const contraseña = document.getElementById("registroPassword").value;
        const confirmPass = document.getElementById("confirmacionPassword").value;
        const listaUsuarios = document.getElementById("listaUsuarios")

        if (
            !nombre.trim() ||
            !apellido.trim() ||
            !usuario.trim() ||
            !email.trim() ||
            !contraseña.trim() ||
            !confirmPass.trim() 
        ) {
            document.getElementById("mensajes").innerHTML = `
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                Todos los campos son obligatorios.
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            `;
            return;
        }

        if (contraseña !== confirmPass){
            document.getElementById("mensajes").innerHTML = `
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                Las contraseñas no coinciden.
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            `
            return;
        };

        const nuevoUsuario = {
            nombre,
            apellido,
            usuario,
            email,
            contraseña,
            saldo: 500,
            contactos: [],
            movimientos: []
        }

        let usuarios =JSON.parse(localStorage.getItem("usuarios")) || [];

        usuarios.push(nuevoUsuario);

        localStorage.setItem("usuarios",JSON.stringify(usuarios));

        document.getElementById("mensajes").innerHTML = `
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden"></span>
                </div>
                Registro completado. Redirigiendo...
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            `
        setTimeout(() =>{
            window.location.href = "login.html";
        }, 3000);

    })

})

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
